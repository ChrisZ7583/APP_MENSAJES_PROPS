<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PropChat">
<meta name="theme-color" content="#0d0d0f" id="theme-meta">
<title>APP_MENSAJES_PROPS v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">

<script>
// ─── PWA MANIFEST (data URI) ───────────────────────────────
(function(){
  const manifest = {
    name:"APP_MENSAJES_PROPS",
    short_name:"PropChat",
    description:"Prop iMessage simulator for film productions",
    start_url:".",
    display:"fullscreen",
    orientation:"portrait",
    background_color:"#0d0d0f",
    theme_color:"#0d0d0f",
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='120' fill='%234f8ef7'/%3E%3Cpath d='M128 160h256a32 32 0 0 1 32 32v160a32 32 0 0 1-32 32H176l-80 64V192a32 32 0 0 1 32-32z' fill='white'/%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]
  };
  const blob = new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);
})();

// ─── SERVICE WORKER (Blob URL) ─────────────────────────────
(function(){
  const swCode = `
const CACHE='propchat-v2';
const ASSETS=['/'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting()));
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(n=>n!==CACHE).map(n=>caches.delete(n)))).then(()=>self.clients.claim()));
});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    if(!res||res.status!==200||res.type!=='basic') return res;
    const clone=res.clone();
    caches.open(CACHE).then(c=>c.put(e.request,clone));
    return res;
  }).catch(()=>caches.match('/'))));
});
  `;
  const blob = new Blob([swCode],{type:'application/javascript'});
  const url = URL.createObjectURL(blob);
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register(url,{scope:'./'}).catch(()=>{});
  }
})();
</script>

<style>
/* ─── TOKENS ───────────────────────────────────────────────── */
:root {
  --text-xs:clamp(0.7rem,0.65rem+0.25vw,0.8rem);
  --text-sm:clamp(0.875rem,0.8rem+0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem+0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem+0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem+1.25vw,2.25rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;
  --radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --font-body:'Inter','Helvetica Neue',sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

/* ─── DARK MODE ─────────────────────────────────────────────── */
[data-theme="dark"],:root {
  --bg:#0d0d0f;
  --surface:#18181c;
  --surface-2:#1f1f24;
  --surface-3:#26262d;
  --border:rgba(255,255,255,0.08);
  --text:#e8e8ea;
  --text-muted:#7a7a84;
  --text-faint:#45454d;
  --accent:#4f8ef7;
  --accent-hover:#3b7df5;
  --accent-bubble:#1e3a6e;
  --received-bubble:#2a2a33;
  --green:#34c759;
  --red:#ff3b30;
  --orange:#ff9500;
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
  --shadow-lg:0 12px 40px rgba(0,0,0,.6);
  --waveform-sent:rgba(255,255,255,0.5);
  --waveform-recv:rgba(150,150,170,0.6);
  --waveform-played-sent:rgba(255,255,255,0.2);
  --waveform-played-recv:rgba(150,150,170,0.25);
}

/* ─── LIGHT MODE ─────────────────────────────────────────────── */
[data-theme="light"] {
  --bg:#f2f2f7;
  --surface:#ffffff;
  --surface-2:#f8f8fa;
  --surface-3:#efeff4;
  --border:rgba(0,0,0,0.08);
  --text:#1c1c1e;
  --text-muted:#6c6c70;
  --text-faint:#aeaeb2;
  --accent:#007aff;
  --accent-hover:#0062cc;
  --accent-bubble:#007aff;
  --received-bubble:#e5e5ea;
  --green:#34c759;
  --red:#ff3b30;
  --orange:#ff9500;
  --shadow-md:0 4px 20px rgba(0,0,0,.1);
  --shadow-lg:0 12px 40px rgba(0,0,0,.18);
  --waveform-sent:rgba(255,255,255,0.7);
  --waveform-recv:rgba(80,80,100,0.4);
  --waveform-played-sent:rgba(255,255,255,0.3);
  --waveform-played-recv:rgba(80,80,100,0.18);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;text-size-adjust:none;height:100%;}
body{
  font-family:var(--font-body);
  font-size:var(--text-base);
  color:var(--text);
  background:var(--bg);
  height:100%;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  -webkit-user-select:none;
  user-select:none;
}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;-webkit-tap-highlight-color:transparent;}
input,textarea{font:inherit;color:inherit;background:none;border:none;outline:none;-webkit-user-select:text;user-select:text;}
img{display:block;max-width:100%;}

/* ─── LAYOUT ─────────────────────────────────────────────────── */
#app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  overflow:hidden;
  position:relative;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bot);
  padding-left:var(--safe-left);
  padding-right:var(--safe-right);
}

/* ─── STATUS BAR ──────────────────────────────────────────────── */
#statusbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:var(--space-2) var(--space-4) 0;
  font-size:var(--text-xs);
  font-weight:600;
  flex-shrink:0;
  height:44px;
}
#statusbar .time{font-size:.95rem;font-weight:700;letter-spacing:-.02em;}
#statusbar .icons{display:flex;align-items:center;gap:var(--space-2);}
#statusbar .icons svg{width:16px;height:16px;}

/* ─── CHAT HEADER ───────────────────────────────────────────── */
#chatheader{
  display:flex;
  align-items:center;
  gap:var(--space-3);
  padding:var(--space-2) var(--space-4) var(--space-3);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--surface);
}
#chatheader .back{
  color:var(--accent);
  font-size:var(--text-base);
  display:flex;
  align-items:center;
  gap:2px;
  min-width:44px;
  min-height:44px;
}
.contact-avatar{
  width:36px;height:36px;
  border-radius:var(--radius-full);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:700;
  flex-shrink:0;
  transition:background var(--transition);
  color:#fff;
}
.contact-info{flex:1;}
.contact-name{font-weight:600;font-size:var(--text-sm);line-height:1.2;}
.contact-status{font-size:var(--text-xs);color:var(--text-muted);}
.header-actions{display:flex;gap:var(--space-3);align-items:center;}
.header-actions button{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;color:var(--accent);}

/* ─── MESSAGES ──────────────────────────────────────────────── */
#messages{
  flex:1;
  overflow-y:auto;
  padding:var(--space-4);
  display:flex;
  flex-direction:column;
  gap:var(--space-2);
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
#messages::-webkit-scrollbar{display:none;}
.msg-group{display:flex;flex-direction:column;gap:3px;}
.msg-group.sent{align-items:flex-end;}
.msg-group.received{align-items:flex-start;}
.bubble-row{display:flex;align-items:flex-end;gap:var(--space-2);}
.msg-group.sent .bubble-row{flex-direction:row-reverse;}
.bubble{
  max-width:72%;
  padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-lg);
  font-size:var(--text-sm);
  line-height:1.5;
  word-break:break-word;
  animation:bubbleIn .25s cubic-bezier(0.34,1.56,0.64,1) both;
}
[data-theme="dark"] .msg-group.sent .bubble{
  background:var(--accent-bubble);
  color:#fff;
  border-bottom-right-radius:var(--radius-sm);
}
[data-theme="light"] .msg-group.sent .bubble{
  background:var(--accent);
  color:#fff;
  border-bottom-right-radius:var(--radius-sm);
}
.msg-group.received .bubble{
  background:var(--received-bubble);
  border-bottom-left-radius:var(--radius-sm);
}
.bubble-time{font-size:.65rem;color:var(--text-faint);padding:0 var(--space-1);flex-shrink:0;}

/* ─── TYPING ─────────────────────────────────────────────────── */
.typing-bubble{
  background:var(--received-bubble);
  border-radius:var(--radius-lg);
  border-bottom-left-radius:var(--radius-sm);
  padding:var(--space-2) var(--space-3);
  display:inline-flex;
  gap:4px;
  align-items:center;
  animation:bubbleIn .25s cubic-bezier(0.34,1.56,0.64,1) both;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:typing 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
.date-divider{text-align:center;font-size:var(--text-xs);color:var(--text-faint);padding:var(--space-2) 0;font-weight:500;}

/* ─── VOICE BUBBLE ───────────────────────────────────────────── */
.voice-bubble{
  display:flex;align-items:center;gap:var(--space-2);
  padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-lg);
  animation:bubbleIn .25s cubic-bezier(0.34,1.56,0.64,1) both;
  min-width:200px;max-width:72%;
}
.msg-group.sent .voice-bubble{
  background:var(--accent-bubble);
  border-bottom-right-radius:var(--radius-sm);
}
[data-theme="light"] .msg-group.sent .voice-bubble{background:var(--accent);}
.msg-group.received .voice-bubble{
  background:var(--received-bubble);
  border-bottom-left-radius:var(--radius-sm);
}
.voice-play-btn{
  width:32px;height:32px;
  border-radius:var(--radius-full);
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:.85rem;
  transition:background var(--transition),transform var(--transition);
}
.voice-play-btn:hover{background:rgba(255,255,255,.25);}
.voice-play-btn:active{transform:scale(.9);}
[data-theme="light"] .msg-group.received .voice-play-btn{background:rgba(0,0,0,.1);}
.waveform-wrap{
  flex:1;display:flex;align-items:center;height:32px;gap:2px;
  cursor:pointer;position:relative;overflow:hidden;
}
.voice-progress-dot{
  width:9px;height:9px;border-radius:50%;background:#fff;
  flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.3);
  margin-right:2px;transition:none;position:relative;z-index:2;
}
.msg-group.received .voice-progress-dot{background:var(--text-muted);}
.waveform-bar{
  border-radius:2px;flex-shrink:0;width:3px;
  transition:background .2s ease,opacity .15s ease;
}
.msg-group.sent .waveform-bar{background:var(--waveform-sent);}
.msg-group.received .waveform-bar{background:var(--waveform-recv);}
.waveform-bar.played{
  opacity:.35;
}
.voice-duration{
  font-size:.7rem;color:var(--text-faint);
  flex-shrink:0;min-width:28px;text-align:right;
  font-variant-numeric:tabular-nums;
}
[data-theme="dark"] .msg-group.sent .voice-duration{color:rgba(255,255,255,.5);}
[data-theme="light"] .msg-group.sent .voice-duration{color:rgba(255,255,255,.75);}
@keyframes wavePlay{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.8);}}
.waveform-bar.playing{animation:wavePlay .5s ease-in-out infinite;}

/* ─── INPUT BAR ──────────────────────────────────────────────── */
#inputbar{
  display:flex;align-items:flex-end;gap:var(--space-2);
  padding:var(--space-2) var(--space-3) var(--space-3);
  border-top:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}
.input-wrap{
  flex:1;background:var(--surface-3);
  border-radius:var(--radius-full);
  display:flex;align-items:flex-end;
  padding:var(--space-2) var(--space-3);
  min-height:36px;border:1px solid var(--border);
}
#chatinput{
  flex:1;resize:none;background:none;
  font-size:var(--text-sm);line-height:1.4;
  max-height:100px;overflow-y:auto;
}
#chatinput::placeholder{color:var(--text-faint);}
.input-icon-btn{
  width:36px;height:36px;
  border-radius:var(--radius-full);
  display:flex;align-items:center;justify-content:center;
  background:var(--accent);color:#fff;
  transition:background var(--transition),transform var(--transition),box-shadow var(--transition);
  flex-shrink:0;min-width:44px;min-height:44px;
}
.input-icon-btn:hover{background:var(--accent-hover);}
.input-icon-btn:active{transform:scale(.92);}
.input-icon-btn.mic{
  background:var(--surface-3);
  color:var(--text-muted);
  border:1px solid var(--border);
}
.input-icon-btn.mic.recording{
  background:var(--red)!important;
  color:#fff!important;
  border-color:var(--red)!important;
  box-shadow:0 0 0 4px rgba(255,59,48,.2);
}

/* ─── MIC RECORDING BAR & UI ─────────────────────────────────── */
.mic-recording-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--red);height:3px;
  display:none;z-index:200;
}
.mic-recording-bar.recording{display:block;animation:micPulse .6s ease-in-out infinite;}
.mic-recording-ui{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:var(--space-3) var(--space-4);
  display:none;
  align-items:center;
  justify-content:space-between;
  z-index:199;
  gap:var(--space-3);
  padding-bottom:calc(var(--space-3) + var(--safe-bot));
}
.mic-recording-ui.active{display:flex;}
.mic-rec-indicator{display:flex;align-items:center;gap:var(--space-2);color:var(--red);font-size:var(--text-sm);font-weight:600;}
.mic-rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:micPulse .6s ease-in-out infinite;}
.mic-rec-timer{font-size:var(--text-base);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.02em;color:var(--text);}
.mic-rec-cancel{font-size:var(--text-sm);color:var(--text-muted);padding:var(--space-2) var(--space-3);min-height:44px;display:flex;align-items:center;}

/* ─── OPERATOR ───────────────────────────────────────────────── */
#operator-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:100;
  display:flex;flex-direction:column;justify-content:flex-end;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
#operator-overlay.open{opacity:1;pointer-events:all;}
#operator-panel{
  background:var(--surface);
  border-radius:var(--radius-2xl) var(--radius-2xl) 0 0;
  padding:var(--space-4) var(--space-4) calc(var(--space-8) + var(--safe-bot));
  max-height:85dvh;overflow-y:auto;
  transform:translateY(20px);
  transition:transform .3s cubic-bezier(0.34,1.2,0.64,1);
}
#operator-overlay.open #operator-panel{transform:translateY(0);}
.panel-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto var(--space-4);}
.panel-title{
  font-size:var(--text-xs);font-weight:700;
  margin-bottom:var(--space-3);
  color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.08em;
}
#operator-panel::-webkit-scrollbar{width:4px;}
#operator-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ─── SCENE GRID ─────────────────────────────────────────────── */
.scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);margin-bottom:var(--space-4);}
.scene-btn{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:var(--space-3);
  text-align:left;
  transition:background var(--transition),border-color var(--transition),transform var(--transition);
  min-height:44px;
}
.scene-btn:hover{background:var(--surface-3);}
.scene-btn:active{transform:scale(.97);}
.scene-btn.active{border-color:var(--accent);background:rgba(79,142,247,.12);}
.scene-label{font-size:var(--text-xs);color:var(--text-muted);display:block;}
.scene-name{font-size:var(--text-sm);font-weight:600;}

/* ─── ACTION GRID ────────────────────────────────────────────── */
.action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-2);margin-bottom:var(--space-4);}
.action-btn{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:var(--space-3) var(--space-2);
  display:flex;flex-direction:column;align-items:center;gap:var(--space-1);
  transition:background var(--transition),transform var(--transition);
  min-height:64px;justify-content:center;
}
.action-btn:hover{background:var(--surface-3);}
.action-btn:active{transform:scale(.95);}
.action-btn .icon{font-size:1.4rem;}
.action-btn .label{font-size:var(--text-xs);color:var(--text-muted);text-align:center;line-height:1.2;}

/* ─── QUEUE ──────────────────────────────────────────────────── */
.queue-item{
  display:flex;align-items:center;gap:var(--space-3);
  padding:var(--space-3);background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-md);margin-bottom:var(--space-2);
  cursor:pointer;
  transition:background var(--transition),transform var(--transition);
  min-height:44px;
}
.queue-item:hover{background:var(--surface-3);}
.queue-item:active{transform:scale(.98);}
.queue-badge{font-size:var(--text-xs);padding:2px 8px;border-radius:var(--radius-full);font-weight:600;flex-shrink:0;}
.badge-sent{background:rgba(79,142,247,.2);color:var(--accent);}
.badge-recv{background:rgba(52,199,89,.2);color:var(--green);}
.badge-voice{background:rgba(255,149,0,.2);color:var(--orange);}
.queue-text{flex:1;font-size:var(--text-sm);line-height:1.3;}
.queue-fire{font-size:1rem;color:var(--text-muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center;}

/* ─── OP TOGGLE ──────────────────────────────────────────────── */
#op-toggle{
  position:fixed;top:50%;right:-2px;
  transform:translateY(-50%);
  background:var(--accent);color:#fff;
  padding:var(--space-3) var(--space-2);
  border-radius:var(--radius-md) 0 0 var(--radius-md);
  font-size:var(--text-xs);font-weight:700;
  writing-mode:vertical-rl;text-orientation:mixed;
  letter-spacing:.06em;z-index:50;
  box-shadow:var(--shadow-md);
  transition:background var(--transition),transform var(--transition);
  min-height:44px;
}
#op-toggle:hover{background:var(--accent-hover);}
#op-toggle:active{transform:translateY(-50%) scale(.96);}

/* ─── CONTACT EDITOR ─────────────────────────────────────────── */
.custom-msg-row{display:flex;gap:var(--space-2);margin-bottom:var(--space-2);}
.custom-msg-row input{
  flex:1;background:var(--surface-3);
  border:1px solid var(--border);border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-3);font-size:var(--text-sm);color:var(--text);
}
.custom-msg-row input::placeholder{color:var(--text-faint);}
.send-custom-btn{
  background:var(--accent);color:#fff;
  padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;
  white-space:nowrap;min-height:44px;
  transition:background var(--transition),transform var(--transition);
}
.send-custom-btn:hover{background:var(--accent-hover);}
.send-custom-btn:active{transform:scale(.96);}
.contact-editor{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:var(--space-3);
  margin-bottom:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3);
}
.editor-row{display:flex;align-items:center;gap:var(--space-3);}
.editor-label{font-size:var(--text-xs);color:var(--text-muted);min-width:56px;flex-shrink:0;}
.editor-input{
  flex:1;background:var(--surface-3);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);
  font-size:var(--text-sm);color:var(--text);min-height:36px;
  transition:border-color var(--transition);
}
.editor-input:focus{border-color:var(--accent);}
.editor-input::placeholder{color:var(--text-faint);}
.color-swatches{display:flex;flex-wrap:wrap;gap:var(--space-2);}
.swatch{
  width:28px;height:28px;border-radius:var(--radius-full);
  cursor:pointer;border:2px solid transparent;
  transition:transform var(--transition),border-color var(--transition);
  flex-shrink:0;
}
.swatch:hover{transform:scale(1.15);}
.swatch.selected{border-color:#fff;transform:scale(1.15);}
[data-theme="light"] .swatch.selected{border-color:#333;}
.apply-contact-btn{
  background:var(--accent);color:#fff;border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-4);font-size:var(--text-sm);font-weight:600;
  min-height:40px;width:100%;
  transition:background var(--transition),transform var(--transition);
}
.apply-contact-btn:hover{background:var(--accent-hover);}
.apply-contact-btn:active{transform:scale(.97);}
#editor-avatar-preview{
  width:40px;height:40px;border-radius:var(--radius-full);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0;
  transition:background var(--transition);
}

/* ─── SETTINGS ───────────────────────────────────────────────── */
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-3);background:var(--surface-2);
  border:1px solid var(--border);border-radius:var(--radius-md);
  margin-bottom:var(--space-2);
}
.settings-row-label{font-size:var(--text-sm);display:flex;align-items:center;gap:var(--space-2);}
.toggle-pill{
  width:48px;height:28px;border-radius:var(--radius-full);
  background:var(--surface-3);border:1px solid var(--border);
  position:relative;cursor:pointer;
  transition:background var(--transition);
}
.toggle-pill.on{background:var(--accent);}
.toggle-pill .knob{
  position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:var(--radius-full);
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);
  transition:transform var(--transition);
}
.toggle-pill.on .knob{transform:translateX(20px);}
.close-panel-btn{
  width:100%;margin-top:var(--space-3);padding:var(--space-3);
  border-radius:var(--radius-md);background:var(--surface-3);
  color:var(--text-muted);font-size:var(--text-sm);font-weight:600;
  transition:background var(--transition);min-height:44px;
}
.close-panel-btn:hover{background:var(--surface-2);}

/* ─── NOTIFICATION ────────────────────────────────────────────── */
#notif-banner{
  position:fixed;
  top:calc(var(--space-3) + var(--safe-top));
  left:50%;
  transform:translateX(-50%) translateY(-120%);
  width:calc(100% - var(--space-8));max-width:360px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:var(--space-3) var(--space-4);
  display:flex;align-items:center;gap:var(--space-3);
  z-index:300;box-shadow:var(--shadow-lg);pointer-events:none;
}
#notif-banner.show{animation:notifSlide 3s ease forwards;}
.notif-app-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.notif-content{flex:1;}
.notif-app{font-size:var(--text-xs);color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.notif-text{font-size:var(--text-sm);font-weight:500;}

/* ─── CALL OVERLAY ────────────────────────────────────────────── */
#call-overlay{
  position:fixed;inset:0;
  background:linear-gradient(180deg,#1a3a1a 0%,#0d1f0d 100%);
  z-index:400;display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  padding:calc(80px + var(--safe-top)) var(--space-8) calc(var(--space-10) + var(--safe-bot));
  opacity:0;pointer-events:none;
  transition:opacity .4s ease;
}
#call-overlay.active{opacity:1;pointer-events:all;}
.call-contact{text-align:center;}
.call-avatar-large{
  width:80px;height:80px;border-radius:var(--radius-full);
  font-size:2rem;font-weight:700;display:flex;
  align-items:center;justify-content:center;
  margin:0 auto var(--space-4);color:#fff;
}
.call-name{font-size:var(--text-xl);font-weight:700;color:#fff;margin-bottom:var(--space-2);}
.call-status{font-size:var(--text-base);color:rgba(255,255,255,.7);animation:pulse 1.5s ease infinite;}
.call-actions{display:flex;gap:var(--space-8);align-items:center;}
.call-btn{width:64px;height:64px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
.call-btn.hangup{background:var(--red);}
.call-btn.accept{background:var(--green);}
.call-btn.mute{background:rgba(255,255,255,.15);}

/* ─── ANIMATIONS ─────────────────────────────────────────────── */
@keyframes bubbleIn{
  0%{opacity:0;transform:scale(.85) translateY(6px);}
  100%{opacity:1;transform:scale(1) translateY(0);}
}
@keyframes typing{
  0%,60%,100%{transform:translateY(0);opacity:.4;}
  30%{transform:translateY(-4px);opacity:1;}
}
@keyframes micPulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes notifSlide{
  0%{transform:translateX(-50%) translateY(-120%);opacity:0;}
  15%{transform:translateX(-50%) translateY(0);opacity:1;}
  80%{transform:translateX(-50%) translateY(0);opacity:1;}
  100%{transform:translateX(-50%) translateY(-120%);opacity:0;}
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

/* ─── FULLSCREEN HINT ─────────────────────────────────────────── */
#fs-hint{
  position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  color:#fff;font-size:var(--text-xs);
  padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-full);
  z-index:500;
  opacity:0;pointer-events:none;
  transition:opacity .4s ease;
  white-space:nowrap;
}
#fs-hint.show{opacity:1;}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
}
</style>
</head>

<script>
'use strict';

// ─── PALETTE ────────────────────────────────────────────────
const COLORS = [
  '#4f8ef7','#34c759','#ff6b35','#ff3b30','#ff9500',
  '#af52de','#5ac8fa','#ff2d55','#a2845e','#8e8e93'
];
let selectedColor = COLORS[0];

// ─── SCENES ─────────────────────────────────────────────────
const SCENES = [
  {
    id:'s1', label:'CAP 01 · ESC 12', name:'Mamá / urgente',
    contact:{name:'Mamá', initials:'M', color:'#4f8ef7', status:'en línea'},
    messages:[
      {type:'received', text:'¿Dónde estás? Llevo 20 min esperando'},
      {type:'received', text:'Por favor respóndeme'},
      {type:'sent', text:'Ya voy, tranquila'},
      {type:'voice', side:'received', duration:'0:14'},
      {type:'sent', text:'5 minutos y estoy ahí'},
    ]
  },
  {
    id:'s2', label:'CAP 03 · ESC 07', name:'Carlos / pelea',
    contact:{name:'Carlos', initials:'C', color:'#ff6b35', status:'en línea'},
    messages:[
      {type:'sent', text:'Necesito que me expliques qué pasó ayer'},
      {type:'received', text:'Nada. No pasó nada.'},
      {type:'sent', text:'Carlos, sé lo que vi.'},
      {type:'voice', side:'sent', duration:'0:08'},
      {type:'received', text:'Estás exagerando como siempre'},
    ]
  },
  {
    id:'s3', label:'CAP 05 · ESC 14', name:'Dr. Vargas / trabajo',
    contact:{name:'Dr. Vargas', initials:'V', color:'#34c759', status:'en línea'},
    messages:[
      {type:'received', text:'El cliente canceló la reunión de las 3pm'},
      {type:'sent', text:'¿Qué pasó?'},
      {type:'voice', side:'received', duration:'0:22'},
      {type:'sent', text:'Listo, confirmo asistencia'},
    ]
  },
  {
    id:'s4', label:'CAP 08 · ESC 03', name:'Número desconocido',
    contact:{name:'Número desconocido', initials:'?', color:'#ff3b30', status:''},
    messages:[
      {type:'received', text:'Sé dónde estás.'},
      {type:'received', text:'No te muevas.'},
      {type:'sent', text:'¿Quién eres?'},
      {type:'received', text:'Eso no importa. Escúchame bien.'},
    ]
  },
];

let currentScene = SCENES[0];
let queueIndex = 0;
let typingTimeout = null;
let typingEl = null;
let theme = 'dark';

// ─── FULLSCREEN ──────────────────────────────────────────────
function requestFullscreen(){
  const el = document.documentElement;
  const go = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if(go) go.call(el).catch(()=>{});
}

let fsHintShown = false;
document.addEventListener('touchstart', function onFirstTouch(){
  if(!fsHintShown && !document.fullscreenElement){
    fsHintShown = true;
    const hint = document.getElementById('fs-hint');
    hint.classList.add('show');
    setTimeout(()=>hint.classList.remove('show'), 3000);
    requestFullscreen();
  }
  document.removeEventListener('touchstart', onFirstTouch);
}, {once:true});

// ─── CLOCK ──────────────────────────────────────────────────
function updateClock(){
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
updateClock();
setInterval(updateClock, 60000);

// ─── INITIALS ───────────────────────────────────────────────
function getInitials(name){
  const parts = name.trim().split(' ');
  if(parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.trim().slice(0,2).toUpperCase() || '?';
}

// ─── COLOR SWATCHES ─────────────────────────────────────────
function buildSwatches(){
  const wrap = document.getElementById('color-swatches');
  wrap.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (c === selectedColor ? ' selected' : '');
    sw.style.background = c;
    sw.setAttribute('role','radio');
    sw.setAttribute('aria-label', c);
    sw.onclick = () => {
      selectedColor = c;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      updateEditorPreview();
    };
    wrap.appendChild(sw);
  });
}

function updateEditorPreview(){
  const name = document.getElementById('ed-name').value || '?';
  const prev = document.getElementById('editor-avatar-preview');
  prev.textContent = getInitials(name);
  prev.style.background = selectedColor;
}

function applyContact(){
  const name = document.getElementById('ed-name').value.trim() || currentScene.contact.name;
  const status = document.getElementById('ed-status').value.trim() || 'en línea';
  const color = selectedColor;
  const initials = getInitials(name);
  document.getElementById('contact-name').textContent = name;
  document.getElementById('contact-status-text').textContent = status;
  const av = document.getElementById('contact-avatar');
  av.textContent = initials; av.style.background = color;
  const ca = document.getElementById('call-avatar');
  ca.textContent = initials; ca.style.background = color;
  document.getElementById('call-name').textContent = name;
  const ni = document.getElementById('notif-icon');
  ni.style.background = color;
  currentScene.contact = {name, initials, color, status};
}

// ─── SCENE ──────────────────────────────────────────────────
function buildSceneGrid(){
  const grid = document.getElementById('scene-grid');
  grid.innerHTML = '';
  SCENES.forEach(sc => {
    const btn = document.createElement('button');
    btn.className = 'scene-btn' + (sc.id === currentScene.id ? ' active' : '');
    btn.innerHTML = `<span class="scene-label">${sc.label}</span><span class="scene-name">${sc.name}</span>`;
    btn.onclick = () => { loadScene(sc); toggleOperator(); };
    grid.appendChild(btn);
  });
}

function loadScene(sc){
  currentScene = sc;
  queueIndex = 0;
  // update contact
  const c = sc.contact;
  document.getElementById('contact-name').textContent = c.name;
  document.getElementById('contact-status-text').textContent = c.status;
  const av = document.getElementById('contact-avatar');
  av.textContent = c.initials; av.style.background = c.color;
  const ca = document.getElementById('call-avatar');
  ca.textContent = c.initials; ca.style.background = c.color;
  document.getElementById('call-name').textContent = c.name;
  document.getElementById('notif-icon').style.background = c.color;
  // update editor
  document.getElementById('ed-name').value = c.name;
  document.getElementById('ed-status').value = c.status;
  selectedColor = c.color;
  buildSwatches(); updateEditorPreview();
  // clear + render messages
  clearMessages();
  sc.messages.forEach(m => {
    if(m.type === 'voice') addVoiceBubble(m.side, m.duration, false);
    else addBubble(m.type, m.text, false);
  });
  buildQueue();
  buildSceneGrid();
}

function reloadScene(){ loadScene(currentScene); }

function clearMessages(){
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="date-divider">Hoy</div>';
}

// ─── QUEUE ──────────────────────────────────────────────────
function buildQueue(){
  const queue = document.getElementById('msg-queue');
  queue.innerHTML = '';
  currentScene.messages.forEach((m, i) => {
    const item = document.createElement('div');
    item.className = 'queue-item';
    const badge = document.createElement('span');
    badge.className = 'queue-badge ' + (m.type === 'voice' ? 'badge-voice' : m.type === 'sent' ? 'badge-sent' : 'badge-recv');
    badge.textContent = m.type === 'voice' ? '🎙' : m.type === 'sent' ? 'Actor' : 'Contacto';
    const text = document.createElement('span');
    text.className = 'queue-text';
    text.textContent = m.type === 'voice' ? `Nota de voz (${m.duration || m.side})` : m.text;
    const fire = document.createElement('div');
    fire.className = 'queue-fire';
    fire.textContent = i < queueIndex ? '✓' : '▶';
    fire.style.color = i < queueIndex ? 'var(--green)' : 'var(--text-muted)';
    item.appendChild(badge); item.appendChild(text); item.appendChild(fire);
    item.onclick = () => fireQueueItem(i);
    queue.appendChild(item);
  });
}

function fireQueueItem(i){
  const m = currentScene.messages[i];
  if(!m) return;
  queueIndex = i + 1;
  if(m.type === 'voice') addVoiceBubble(m.side, m.duration);
  else addBubble(m.type, m.text);
  buildQueue();
}

function fireNextInQueue(){
  if(queueIndex >= currentScene.messages.length) return;
  fireQueueItem(queueIndex);
}

// ─── TIMESTAMP ──────────────────────────────────────────────
function nowTime(){
  const n = new Date();
  return `${n.getHours()}:${n.getMinutes().toString().padStart(2,'0')}`;
}

// ─── ADD TEXT BUBBLE ─────────────────────────────────────────
function addBubble(side, text, animate=true){
  if(!text.trim()) return;
  const msgs = document.getElementById('messages');
  const group = document.createElement('div');
  group.className = `msg-group ${side}`;
  const row = document.createElement('div');
  row.className = 'bubble-row';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  if(!animate) bub.style.animation = 'none';
  bub.textContent = text;
  const time = document.createElement('span');
  time.className = 'bubble-time';
  time.textContent = nowTime();
  row.appendChild(bub); row.appendChild(time);
  group.appendChild(row);
  msgs.appendChild(group);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMessage(text){
  addBubble('sent', text);
}

// ─── WAVEFORM ────────────────────────────────────────────────
function generateRandomWaveform(bars=34){
  const heights = [];
  for(let i=0; i<bars; i++){
    // create a somewhat natural wave shape
    const base = 20 + Math.random() * 60;
    heights.push(Math.round(base));
  }
  return heights;
}

// ─── ADD VOICE BUBBLE ────────────────────────────────────────
function addVoiceBubble(side, duration, animate=true){
  const msgs = document.getElementById('messages');
  const group = document.createElement('div');
  group.className = `msg-group ${side}`;

  const row = document.createElement('div');
  row.className = 'bubble-row';

  const vb = document.createElement('div');
  vb.className = 'voice-bubble';
  if(!animate) vb.style.animation = 'none';

  // Play button
  const playBtn = document.createElement('button');
  playBtn.className = 'voice-play-btn';
  playBtn.innerHTML = '▶';
  playBtn.setAttribute('aria-label', 'Reproducir nota de voz');

  // Waveform
  const waveWrap = document.createElement('div');
  waveWrap.className = 'waveform-wrap';

  // Progress dot
  const progDot = document.createElement('div');
  progDot.className = 'voice-progress-dot';
  waveWrap.appendChild(progDot);

  // Bars
  const heights = generateRandomWaveform(34);
  const barEls = [];
  heights.forEach(h => {
    const bar = document.createElement('div');
    bar.className = 'waveform-bar';
    bar.style.height = `${h}%`;
    waveWrap.appendChild(bar);
    barEls.push(bar);
  });

  // Duration
  const durSpan = document.createElement('span');
  durSpan.className = 'voice-duration';
  durSpan.textContent = duration;

  vb.appendChild(playBtn);
  vb.appendChild(waveWrap);
  vb.appendChild(durSpan);

  // Parse total seconds from duration string
  function parseDuration(d){
    const parts = d.split(':');
    return parseInt(parts[0]||0)*60 + parseInt(parts[1]||0);
  }
  const totalSec = Math.max(1, parseDuration(duration));

  // Playback simulation
  let playing = false;
  let playInterval = null;
  let progressRatio = 0;

  function startPlay(){
    playing = true;
    playBtn.innerHTML = '⏸';
    const totalBars = barEls.length;

    barEls.forEach((b,i) => {
      b.classList.remove('played');
      if(i < Math.floor(progressRatio * totalBars)) b.classList.add('played');
      else b.classList.add('playing');
    });

    const startTime = Date.now() - progressRatio * totalSec * 1000;
    playInterval = setInterval(()=>{
      const elapsed = (Date.now() - startTime) / 1000;
      progressRatio = Math.min(elapsed / totalSec, 1);

      const playedBars = Math.floor(progressRatio * totalBars);
      barEls.forEach((b,i)=>{
        b.classList.remove('played','playing');
        if(i < playedBars) b.classList.add('played');
        else b.classList.add('playing');
      });

      const dotMaxTravel = waveWrap.offsetWidth - progDot.offsetWidth - 4;
      progDot.style.transform = `translateX(${progressRatio * dotMaxTravel}px)`;

      const remaining = Math.max(0, totalSec - elapsed);
      const rm = Math.floor(remaining / 60);
      const rs = Math.floor(remaining % 60).toString().padStart(2,'0');
      durSpan.textContent = `${rm}:${rs}`;

      if(progressRatio >= 1) stopPlay(true);
    }, 100);
  }

  function stopPlay(finished=false){
    playing = false;
    clearInterval(playInterval);
    playBtn.innerHTML = '▶';
    barEls.forEach(b => b.classList.remove('playing'));
    if(finished){
      progressRatio = 0;
      progDot.style.transform = 'translateX(0)';
      durSpan.textContent = duration;
      barEls.forEach(b => b.classList.remove('played'));
    }
  }

  playBtn.onclick = () => playing ? stopPlay() : startPlay();
  waveWrap.onclick = () => playing ? stopPlay() : startPlay();

  const time = document.createElement('span');
  time.className = 'bubble-time';
  time.textContent = nowTime();

  row.appendChild(vb);
  row.appendChild(time);
  group.appendChild(row);
  msgs.appendChild(group);
  msgs.scrollTop = msgs.scrollHeight;
}

// ─── SEND USER MESSAGE ───────────────────────────────────────
function sendUserMsg(){
  const inp = document.getElementById('chatinput');
  const text = inp.value.trim();
  if(!text) return;
  addBubble('sent', text);
  inp.value = '';
  inp.style.height = 'auto';
}

function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ─── CUSTOM MESSAGES ─────────────────────────────────────────
function sendCustomSent(){
  const inp = document.getElementById('custom-sent-text');
  if(!inp.value.trim()) return;
  addBubble('sent', inp.value.trim());
  inp.value = '';
  toggleOperator();
}
function sendCustomReceived(){
  const inp = document.getElementById('custom-recv');
  if(!inp.value.trim()) return;
  showTyping();
  const text = inp.value.trim();
  inp.value = '';
  setTimeout(()=>{ removeTyping(); addBubble('received', text); }, 900);
  toggleOperator();
}

// ─── VOICE NOTE FROM PANEL ──────────────────────────────────
function getRandomDuration(){
  const s = 5 + Math.floor(Math.random() * 25);
  return `0:${s.toString().padStart(2,'0')}`;
}
function sendVoiceNote(side, duration){
  if(side === 'received'){
    showTyping();

  } else {

// ─── TYPING ──────────────────────────────────────────────────
function showTyping(){
  removeTyping();
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.id = 'typing-wrap'; wrap.className = 'msg-group received';
  const row = document.createElement('div'); row.className = 'bubble-row';
  const tb = document.createElement('div'); tb.className = 'typing-bubble';
  tb.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(tb); wrap.appendChild(row);
  msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight;
  typingEl = wrap;
  document.getElementById('contact-status-text').textContent = 'escribiendo…';
}
function removeTyping(){
  if(typingEl){ typingEl.remove(); typingEl = null; }
  const sc = document.getElementById('ed-status');
  document.getElementById('contact-status-text').textContent = sc ? sc.value || 'en línea' : 'en línea';
}
function triggerTyping(){
  showTyping(); clearTimeout(typingTimeout);
  typingTimeout = setTimeout(removeTyping, 4000);
}

// ─── NOTIFICATION ────────────────────────────────────────────
function fireNotification(){
  const banner = document.getElementById('notif-banner');
  document.getElementById('notif-app').textContent = 'Mensajes';
  document.getElementById('notif-text').textContent =
    document.getElementById('contact-name').textContent + ': Te llamé';
  banner.classList.remove('show');
  void banner.offsetWidth;
  banner.classList.add('show');
}

// ─── CALL ────────────────────────────────────────────────────
function showCall(){
  document.getElementById('call-status').textContent = 'Llamada…';
  document.getElementById('call-overlay').classList.add('active');
}
function showCallOperator(){
  document.getElementById('call-status').textContent = 'Llamada entrante…';
  document.getElementById('call-overlay').classList.add('active');
  toggleOperator();
}
function endCall(){
  document.getElementById('call-overlay').classList.remove('active');
}

// ─── OPERATOR PANEL ──────────────────────────────────────────
function toggleOperator(){
  document.getElementById('operator-overlay').classList.toggle('open');
}
function closeOperatorIfOutside(e){
  if(e.target === document.getElementById('operator-overlay')) toggleOperator();
}

// ─── THEME ───────────────────────────────────────────────────
function toggleTheme(){
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  const pill = document.getElementById('theme-pill');
  pill.classList.toggle('on', theme === 'light');
  pill.setAttribute('aria-checked', theme === 'light' ? 'true' : 'false');
  document.getElementById('theme-meta').setAttribute('content', theme === 'dark' ? '#0d0d0f' : '#f2f2f7');
}

// ─── MIC RECORDING ───────────────────────────────────────────
let micStartTime = null;
let micTimerInterval = null;
let micIsRecording = false;

function startMicRecording(){
  if(micIsRecording) return;
  micIsRecording = true;
  micStartTime = Date.now();
  document.getElementById('mic-recording-bar').classList.add('recording');
  document.getElementById('mic-recording-ui').classList.add('active');
  document.getElementById('mic-btn').classList.add('recording');
  document.getElementById('mic-rec-timer').textContent = '0:00';
  // temporarily hide inputbar
  document.getElementById('inputbar').style.opacity = '0';
  micTimerInterval = setInterval(()=>{
    const elapsed = Math.floor((Date.now() - micStartTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = (elapsed % 60).toString().padStart(2,'0');
    document.getElementById('mic-rec-timer').textContent = `${m}:${s}`;
  }, 500);
}

function stopMicRecording(){
  if(!micIsRecording) return;
  micIsRecording = false;
  clearInterval(micTimerInterval);
  const elapsed = Math.max(1, Math.floor((Date.now() - micStartTime) / 1000));
  const m = Math.floor(elapsed / 60);
  const s = (elapsed % 60).toString().padStart(2,'0');
  const duration = `${m}:${s}`;
  document.getElementById('mic-recording-bar').classList.remove('recording');
  document.getElementById('mic-recording-ui').classList.remove('active');
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('inputbar').style.opacity = '1';
  addVoiceBubble('sent', duration);
}

function cancelMicRecording(){
  if(!micIsRecording) return;
  micIsRecording = false;
  clearInterval(micTimerInterval);
  document.getElementById('mic-recording-bar').classList.remove('recording');
  document.getElementById('mic-recording-ui').classList.remove('active');
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('inputbar').style.opacity = '1';
}

loadScene(SCENES[0]);
